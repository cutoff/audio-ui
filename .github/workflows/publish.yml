name: Publish

on:
    push:
        branches: [main, develop]
        paths:
            - "package.json"
            - "packages/**"
            - "pnpm-lock.yaml"
            - "pnpm-workspace.yaml"
            - "turbo.json"
            - "scripts/**"
            - ".github/workflows/publish.yml"

concurrency:
    group: publish-${{ github.ref }}
    # Milestone releases on `main` must never be cancelled mid-publish.
    # Unstable snapshots on `develop` are ephemeral — only the latest push matters.
    cancel-in-progress: ${{ github.ref == 'refs/heads/develop' }}

env:
    CI: true

jobs:
    # Milestone publish: fires on pushes to `main` when the root version has changed to a
    # non-`-dev` value. Routes `-preview.*` / `-dp.*` to the `preview` dist-tag and every
    # other release to `latest`.
    publish-milestone:
        name: Publish milestone to npm
        if: github.ref == 'refs/heads/main'
        runs-on: ubuntu-latest
        permissions:
            contents: write
            id-token: write
        steps:
            - name: Checkout
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0
                  # Explicit SHA avoids provenance signing issues (Missing SourceRepositoryRef) on some runners.
                  ref: ${{ github.sha }}

            - name: Read version and detect root version change
              id: version
              run: |
                  set -euo pipefail
                  BEFORE="${{ github.event.before }}"
                  ZERO_SHA="0000000000000000000000000000000000000000"

                  if [[ "$BEFORE" == "$ZERO_SHA" ]]; then
                    echo "version_changed=true" >> "$GITHUB_OUTPUT"
                    echo "No previous ref (new ref); treating root version as changed."
                  else
                    VER_BEFORE=$(git show "$BEFORE:package.json" | node -e "const fs=require('fs'); console.log(JSON.parse(fs.readFileSync(0,'utf8')).version)")
                    VER_AFTER=$(node -p "require('./package.json').version")
                    if [[ "$VER_BEFORE" == "$VER_AFTER" ]]; then
                      echo "version_changed=false" >> "$GITHUB_OUTPUT"
                      echo "Root package.json version unchanged ($VER_AFTER)."
                    else
                      echo "version_changed=true" >> "$GITHUB_OUTPUT"
                      echo "Root version changed: ${VER_BEFORE} -> ${VER_AFTER}"
                    fi
                  fi

                  VERSION=$(node -p "require('./package.json').version")
                  echo "version=$VERSION" >> "$GITHUB_OUTPUT"

                  if [[ "$VERSION" == *"-dev" ]]; then
                    echo "is_release=false" >> "$GITHUB_OUTPUT"
                    echo "Detected development version ($VERSION) — skipping publish."
                  else
                    echo "is_release=true" >> "$GITHUB_OUTPUT"
                  fi

                  if [[ "$VERSION" == *"-preview."* ]] || [[ "$VERSION" == *"-dp."* ]]; then
                    echo "dist_tag=preview" >> "$GITHUB_OUTPUT"
                  else
                    echo "dist_tag=latest" >> "$GITHUB_OUTPUT"
                  fi

            - name: Setup pnpm
              if: steps.version.outputs.version_changed == 'true' && steps.version.outputs.is_release == 'true'
              uses: pnpm/action-setup@v4

            - name: Setup Node.js
              if: steps.version.outputs.version_changed == 'true' && steps.version.outputs.is_release == 'true'
              uses: actions/setup-node@v4
              with:
                  # Trusted publishing (OIDC) requires Node >= 22.14 and npm >= 11.5.1 (see npm docs).
                  node-version: 24
                  cache: "pnpm"
                  registry-url: "https://registry.npmjs.org"

            - name: Upgrade npm for OIDC trusted publishing
              if: steps.version.outputs.version_changed == 'true' && steps.version.outputs.is_release == 'true'
              run: npm install -g npm@^11.5.1

            - name: Install dependencies
              if: steps.version.outputs.version_changed == 'true' && steps.version.outputs.is_release == 'true'
              run: pnpm install --frozen-lockfile

            - name: Run quality pipeline (typecheck, build, lint, test)
              if: steps.version.outputs.version_changed == 'true' && steps.version.outputs.is_release == 'true'
              run: pnpm turbo run typecheck build lint test --continue --no-daemon

            - name: Publish @cutoff/audio-ui-core
              if: steps.version.outputs.version_changed == 'true' && steps.version.outputs.is_release == 'true'
              working-directory: packages/core
              env:
                  NPM_CONFIG_PROVENANCE: "true"
              run: pnpm publish --tag ${{ steps.version.outputs.dist_tag }} --no-git-checks --provenance

            - name: Publish @cutoff/audio-ui-react
              if: steps.version.outputs.version_changed == 'true' && steps.version.outputs.is_release == 'true'
              working-directory: packages/react
              env:
                  NPM_CONFIG_PROVENANCE: "true"
              run: pnpm publish --tag ${{ steps.version.outputs.dist_tag }} --no-git-checks --provenance

            - name: Create git tag
              if: steps.version.outputs.version_changed == 'true' && steps.version.outputs.is_release == 'true'
              env:
                  VERSION: ${{ steps.version.outputs.version }}
              run: |
                  git config user.name "github-actions[bot]"
                  git config user.email "github-actions[bot]@users.noreply.github.com"
                  TAG="release/${VERSION}"
                  if git ls-remote --tags origin "refs/tags/${TAG}" | grep -q .; then
                    echo "Tag ${TAG} already exists on origin — skipping."
                  else
                    git tag "${TAG}"
                    git push origin "refs/tags/${TAG}"
                  fi

    # Unstable publish: fires on every qualifying push to `develop`. Computes a unique
    # `1.0.0-unstable.YYYYMMDD.HHMM.<shortsha>` version at publish time and publishes to the
    # `unstable` dist-tag. `latest` and `preview` are never affected.
    publish-unstable:
        name: Publish unstable to npm
        if: github.ref == 'refs/heads/develop'
        runs-on: ubuntu-latest
        permissions:
            contents: read
            id-token: write
        steps:
            - name: Checkout
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0
                  ref: ${{ github.sha }}

            - name: Setup pnpm
              uses: pnpm/action-setup@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 24
                  cache: "pnpm"
                  registry-url: "https://registry.npmjs.org"

            - name: Upgrade npm for OIDC trusted publishing
              run: npm install -g npm@^11.5.1

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Compute unstable version
              id: version
              run: |
                  set -euo pipefail
                  pnpm run version unstable
                  VERSION=$(node -p "require('./package.json').version")
                  echo "version=$VERSION" >> "$GITHUB_OUTPUT"
                  echo "Computed unstable version: $VERSION"

            - name: Run quality pipeline (typecheck, build, lint, test)
              run: pnpm turbo run typecheck build lint test --continue --no-daemon

            - name: Publish @cutoff/audio-ui-core
              working-directory: packages/core
              env:
                  NPM_CONFIG_PROVENANCE: "true"
              run: pnpm publish --tag unstable --no-git-checks --provenance

            - name: Publish @cutoff/audio-ui-react
              working-directory: packages/react
              env:
                  NPM_CONFIG_PROVENANCE: "true"
              run: pnpm publish --tag unstable --no-git-checks --provenance
